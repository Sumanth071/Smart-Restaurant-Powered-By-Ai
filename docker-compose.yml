services:
  mongo:
    image: mongo:7
    container_name: smart-restaurant-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    container_name: smart-restaurant-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai-smart-restaurant
      JWT_SECRET: docker-demo-secret
      CLIENT_URL: http://localhost:4173
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: smart-restaurant-client
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - server

volumes:
  mongo-data:
